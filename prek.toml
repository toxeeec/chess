[[repos]]
repo = "local"

[[repos.hooks]]
id = "format"
name = "format"
entry = "pnpm run fmt"
language = "system"
pass_filenames = false
stages = ["pre-commit"]

[[repos.hooks]]
id = "lint:ts"
name = "lint:ts"
entry = "pnpm run lint:ts"
language = "system"
files = "\\.(ts|tsx)$"
stages = ["pre-commit"]

[[repos.hooks]]
id = "lint:rust"
name = "lint:rust"
entry = "pnpm run lint:rust"
language = "system"
files = "^game-server/.*\\.rs$"
pass_filenames = false
stages = ["pre-commit"]

[[repos.hooks]]
id = "test"
name = "test"
entry = "pnpm run test:changed"
language = "system"
files = "\\.(rs|ts|tsx)$"
pass_filenames = false
stages = ["pre-push"]
